{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FabricTrack</title>
  <meta name="description" content="Login to FabricTrack garment production tracking system." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body class="login-body">

<div class="login-bg">
  <div class="login-particles"></div>
</div>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🧵</div>
      <h1 class="login-title">FabricTrack</h1>
      <p class="login-subtitle">Garment Production Suite</p>
    </div>

    {% if messages %}
    <div class="login-messages">
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" class="login-form" id="loginForm">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username" class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            type="text"
            name="username"
            id="id_username"
            class="form-control"
            placeholder="Enter your username"
            required
            autofocus
          />
        </div>
      </div>

      <div class="form-group">
        <label for="id_password" class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            name="password"
            id="id_password"
            class="form-control"
            placeholder="Enter your password"
            required
          />
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span class="btn-text">Sign In</span>
        <span class="btn-icon">→</span>
      </button>
    </form>

    <p class="login-footer">FabricTrack v1.0 &mdash; Garment Industry Solution</p>
  </div>
</div>

<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
