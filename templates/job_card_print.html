{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Print Job Card QR - {{ master_entry.job_card_number }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .print-card {
      background: white;
      width: 400px;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      text-align: center;
      border: 2px solid #e2e8f0;
    }
    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .job-card-title {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 1.5rem 0;
      word-break: break-all;
    }
    .qr-wrapper {
      margin: 0 auto 1.5rem auto;
      padding: 1rem;
      border: 2px dashed #cbd5e1;
      display: inline-block;
      border-radius: 12px;
    }
    .scan-text {
      color: #64748b;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .print-btn {
      margin-top: 2rem;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .print-btn:hover {
      background: #2563eb;
    }
    
    @media print {
      body {
        background: white;
        padding: 0;
        align-items: flex-start;
      }
      .print-card {
        box-shadow: none;
        border: none;
        width: 100%;
        max-width: 500px;
      }
      .print-btn {
        display: none;
      }
      .qr-wrapper {
        border-color: #000;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="print-card">
    <div class="brand">FabricTrack</div>
    <div class="job-card-title">{{ master_entry.job_card_number }}</div>
    
    <div class="qr-wrapper" id="qrcode"></div>
    
    <div class="scan-text">Scan to view Job Card details & history</div>
    
    <button class="print-btn" onclick="window.print()">
      🖨️ Print Label
    </button>
  </div>

  <script>
    // Generate QR code for the specific URL
    var qrUrl = "{{ qr_url|escapejs }}";
    var qrcode = new QRCode(document.getElementById("qrcode"), {
      text: qrUrl,
      width: 200,
      height: 200,
      colorDark : "#0f172a",
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
